<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<title>Reproduction de page</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<ul>
		<li>
			<h2>Frontend</h2>

			<p data-value="80">
				HTML5
				<progress class="html5" value="80" max="100"></progress>
			</p>

			<p data-value="60">
				CSS3
				<progress class="css3" value="60" max="100"></progress>
			</p>

			<p data-value="50">
				jQuery
				<progress class="jquery" value="50" max="100"></progress>
			</p>
		</li>

		<li>
			<h2>Backend</h2>

			<p data-value="75">
				Python
				<progress class="python" value="75" max="100"></progress>
			</p>

			<p data-value="65">
				PHP
				<progress class="php" value="65" max="100"></progress>
			</p>

			<p data-value="35">
				Node.js
				<progress class="node-js" value="35" max="100"></progress>
			</p>
		</li>
	</ul>

</body>

</html>
